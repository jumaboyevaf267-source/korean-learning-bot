<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatty - Korean Tutor</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background-color: #1c1c1e; color: white; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 16px; }
        .container { background-color: #000000; border-radius: 20px; padding: 20px; box-sizing: border-box; text-align: center; }
        .korean-text { font-size: 22px; line-height: 1.8; text-align: left; margin-bottom: 20px; word-wrap: break-word; }
        .word { cursor: pointer; display: inline-block; margin: 2px 4px; border-bottom: 1px dashed #555; padding: 2px; }
        .word.selected { color: #64b5f6; border-bottom-color: #64b5f6; background-color: #2c2c2e; border-radius: 4px; }
        .btn { background-color: #2c2c2e; color: #64b5f6; border: none; padding: 14px; width: 100%; border-radius: 15px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .dictionary-popup { display: none; background-color: #121212; border-radius: 20px; border: 1px solid #2c2c2e; padding: 20px; text-align: left; margin-top: 15px; }
        .dict-word { font-size: 28px; font-weight: bold; color: white; }
        .dict-meaning { font-size: 18px; color: #64b5f6; margin-top: 5px; }
        .dict-desc { color: #aaa; font-size: 14px; margin-top: 8px; white-space: pre-line; }
    </style>
</head>
<body>

<div class="container">
    <h3 style="color: #64b5f6; margin-top: 0;">🗣️ Speaking Amaliyoti</h3>
    <div class="korean-text" id="textContainer"></div>
    <button class="btn" onclick="showFullTranslation()">To'liq tarjimasi</button>
</div>

<div class="dictionary-popup" id="dictPopup">
    <div class="dict-word" id="dWord">-</div>
    <div class="dict-meaning" id="dMeaning">-</div>
    <div class="dict-desc" id="dDesc">-</div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    // URL orqali kelgan dars ma'lumotlarini olish
    const urlParams = new URLSearchParams(window.location.search);
    const rawData = urlParams.get('data');
    
    if (rawData) {
        const lessonData = JSON.parse(decodeURIComponent(rawData));
        const textContainer = document.getElementById('textContainer');
        
        // Matnni so'zlarga bo'lib chiqish
        lessonData.words.forEach(w => {
            const span = document.createElement('span');
            span.className = 'word';
            span.innerText = w.ko;
            span.onclick = (e) => {
                document.querySelectorAll('.word').forEach(el => el.classList.remove('selected'));
                e.target.classList.add('selected');
                
                document.getElementById('dWord').innerText = w.ko;
                document.getElementById('dMeaning').innerText = "Tarjimasi: " + w.uz;
                document.getElementById('dDesc').innerText = "O'qilishi: [" + w.tr + "]\nTa'rif: " + w.desc;
                document.getElementById('dictPopup').style.display = 'block';
            };
            textContainer.appendChild(span);
        });

        window.fullUzTranslation = lessonData.full_uz;
    }

    function showFullTranslation() {
        if (window.fullUzTranslation) {
            alert("📝 To'liq tarjimasi:\n" + window.fullUzTranslation);
        }
    }
</script>
</body>
</html>
